

services:
  db:
    image: postgres:15-alpine
    container_name: ipl_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: ipl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ipl_app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - DB_ENGINE=postgres
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=ipl

  dashboard:
    image: node:18-alpine
    container_name: ipl_dashboard
    working_dir: /app/Dashboard
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://app:8000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - app

volumes:
  pgdata:
