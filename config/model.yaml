training:
  random_state: 42
  test_size: 0.1
  cv_folds: 5

model_params:
  random_forest:
    n_estimators: 300
    max_depth: 10
    min_samples_split: 10
    min_samples_leaf: 4
    random_state: 42
    n_jobs: -1
  xgboost:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.02
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 1.5
    reg_lambda: 1.5
    use_label_encoder: false
    eval_metric: "logloss"
    random_state: 42
  lightgbm:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.02
    num_leaves: 31
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 1.5
    reg_lambda: 1.5
    random_state: 42
    verbose: -1
  neural_network:
    hidden_layer_sizes: [128, 64]
    activation: "relu"
    solver: "adam"
    alpha: 0.01
    max_iter: 500
    random_state: 42
  extra_trees:
    n_estimators: 300
    max_depth: 10
    min_samples_split: 10
    min_samples_leaf: 4
    random_state: 42
