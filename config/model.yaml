training:
  random_state: 42
  test_size: 0.1
  cv_folds: 5

model_params:
  random_forest:
    n_estimators: 500
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1
  xgboost:
    n_estimators: 500
    max_depth: 8
    learning_rate: 0.01
    subsample: 0.8
    colsample_bytree: 0.8
    use_label_encoder: false
    eval_metric: "logloss"
    random_state: 42
  lightgbm:
    n_estimators: 500
    max_depth: 8
    learning_rate: 0.01
    num_leaves: 50
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    verbose: -1
  neural_network:
    hidden_layer_sizes: [512, 256, 128]
    activation: "relu"
    solver: "adam"
    alpha: 0.001
    max_iter: 500
    random_state: 42
